<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Javascript partice</title>
    <link rel="stylesheet" href="style.css">

    <script>
        function myFunction(){
            document.getElementById("demo").innerHTML= "showrov ghosh";
        }
        function changeColor(){
            document.getElementById('demo').style.color= "blue";
        }
        function fontSize(){
            document.getElementById('demo').style.fontSize= '100px';
        }
        function reSize(){
            document.getElementById('demo').style.fontSize= '20px';
        }
    </script>
</head>
<body>

    <h1>Javascript code </h1>
    <p id="demo"> Html text</p>

    <button type="button" onclick="myFunction();" >Click here</button>
    <button type="button" onclick="changeColor();"> click here</button>
    <button type="button" onclick="fontSize();"> click here</button>
    <button type="button" onclick="reSize();"> click here</button>
    
</body>
</html>
